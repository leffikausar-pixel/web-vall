<!DOCTYPE html>
<html>
<head>
    <title>Sapa Keren</title>
</head>
<body>

<h1 id="teks">Klik tombolnya 😏</h1>
<button onclick="sapaKeren()">Gas!</button>

<script>
function sapaKeren() {
    let nama = prompt("Nama lu siapa?");
    let jam = new Date().getHours();
    let ucapan;

    if (jam < 12) ucapan = "Pagi";
    else if (jam < 18) ucapan = "Siang";
    else ucapan = "Malam";

    document.getElementById("teks").innerHTML =
        `Halo ${nama} 👋, selamat ${ucapan}!`;
}
</script>

</body>
</html>
