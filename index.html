<!DOCTYPE html>
<html>
<head>
    <title>Web Vall 😎</title>

    <!-- INI WAJIB BIAR GAK KEKECILAN -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;

            /* Biar gak kosong */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .calc {
            margin: 10px auto;
            width: 95%;
            max-width: 420px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
        }

        input {
            width: 100%;
            padding: 18px;
            font-size: 24px;
        }

        button {
            padding: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<h1 id="judul">Klik dulu 😏</h1>
<button onclick="sapa()">Mulai</button>

<div class="calc">
    <input type="text" id="layar" readonly>

    <div class="grid">
        <button onclick="tambah('7')">7</button>
        <button onclick="tambah('8')">8</button>
        <button onclick="tambah('9')">9</button>
        <button class="op" onclick="tambah('/')">/</button>

        <button onclick="tambah('4')">4</button>
        <button onclick="tambah('5')">5</button>
        <button onclick="tambah('6')">6</button>
        <button class="op" onclick="tambah('*')">*</button>

        <button onclick="tambah('1')">1</button>
        <button onclick="tambah('2')">2</button>
        <button onclick="tambah('3')">3</button>
        <button class="op" onclick="tambah('-')">-</button>

        <button onclick="tambah('0')">0</button>
        <button onclick="hapus()">C</button>
        <button class="equal" onclick="hitung()">=</button>
        <button class="op" onclick="tambah('+')">+</button>

        <button onclick="sqrt()">√</button>
        <button onclick="pangkat()">x²</button>
        <button onclick="log()">log</button>
        <button class="mode" onclick="toggleMode()">DEG</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
    </div>
</div>

<script>
let mode = "deg";

window.onload = function() {
    sapa();
};

// suara klik
function klikSound() {
    let audio = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
    audio.play();
}

function sapa() {
    let nama = prompt("Nama lu siapa?");
    let jam = new Date().getHours();
    let ucapan;

    if (jam < 12) ucapan = "pagi";
    else if (jam < 18) ucapan = "siang";
    else ucapan = "malam";

    document.getElementById("judul").innerHTML =
        `Halo ${nama} 👋, selamat ${ucapan}!`;
}
}

function tambah(val) {
    klikSound();
    document.getElementById("layar").value += val;
}

function hitung() {
    klikSound();
    try {
        document.getElementById("layar").value =
            eval(document.getElementById("layar").value);
    } catch {
        alert("Error 😭");
    }
}

function hapus() {
    klikSound();
    document.getElementById("layar").value = "";
}

function sqrt() {
    klikSound();
    let x = layar.value;
    layar.value = Math.sqrt(x);
}

function pangkat() {
    klikSound();
    let x = layar.value;
    layar.value = Math.pow(x, 2);
}

function log() {
    klikSound();
    let x = layar.value;
    layar.value = Math.log10(x);
}

function toRad(x) {
    return x * Math.PI / 180;
}

function sin() {
    klikSound();
    let x = layar.value;
    layar.value = mode === "deg" ? Math.sin(toRad(x)) : Math.sin(x);
}

function cos() {
    klikSound();
    let x = layar.value;
    layar.value = mode === "deg" ? Math.cos(toRad(x)) : Math.cos(x);
}

function tan() {
    klikSound();
    let x = layar.value;
    layar.value = mode === "deg" ? Math.tan(toRad(x)) : Math.tan(x);
}

function toggleMode() {
    klikSound();
    let btn = document.querySelector(".mode");

    if (mode === "deg") {
        mode = "rad";
        btn.innerHTML = "RAD";
    } else {
        mode = "deg";
        btn.innerHTML = "DEG";
    }
}
</script>

</body>
</html>
