<!DOCTYPE html>
<html>
<head>
    <title>Vall Calculator 😎</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .btn-start {
            margin: 10px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #00c9a7;
            cursor: pointer;
        }

        .calc {
            margin: 20px auto;
            width: 95%;
            max-width: 420px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        input {
            width: 100%;
            padding: 18px;
            font-size: 24px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            text-align: right;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            width: 100%;
            height: 65px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #00c9a7;
            transition: 0.15s;
        }

        button:active {
            transform: scale(0.92);
        }

        .op { background: #ff7675; }
        .equal { background: #ffeaa7; }
        .mode { background: #74b9ff; }
    </style>
</head>
<body>

<h1 id="judul">Klik dulu 😏</h1>
<button class="btn-start" onclick="sapa()">Mulai</button>

<div class="calc">
    <input type="text" id="layar" readonly>

    <div class="grid">
        <button onclick="tambah('7')">7</button>
        <button onclick="tambah('8')">8</button>
        <button onclick="tambah('9')">9</button>
        <button class="op" onclick="tambah('/')">/</button>

        <button onclick="tambah('4')">4</button>
        <button onclick="tambah('5')">5</button>
        <button onclick="tambah('6')">6</button>
        <button class="op" onclick="tambah('*')">*</button>

        <button onclick="tambah('1')">1</button>
        <button onclick="tambah('2')">2</button>
        <button onclick="tambah('3')">3</button>
        <button class="op" onclick="tambah('-')">-</button>

        <button onclick="tambah('0')">0</button>
        <button onclick="hapus()">C</button>
        <button class="equal" onclick="hitung()">=</button>
        <button class="op" onclick="tambah('+')">+</button>

        <button onclick="sqrt()">√</button>
        <button onclick="pangkat()">x²</button>
        <button onclick="log()">log</button>
        <button class="mode" onclick="toggleMode()">DEG</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
        <button style="visibility:hidden"></button>
    </div>
</div>

<script>
let mode = "deg";

function sapa() {
    let nama = prompt("Nama lu siapa?");
    let jam = new Date().getHours();
    let ucapan = jam < 12 ? "pagi" : jam < 18 ? "siang" : "malam";

    document.getElementById("judul").innerHTML =
        `Halo ${nama} 👋, selamat ${ucapan}!`;
}

function tambah(val) {
    layar.value += val;
}

function hitung() {
    try {
        layar.value = eval(layar.value);
    } catch {
        alert("Error 😭");
    }
}

function hapus() {
    layar.value = "";
}

function sqrt() {
    layar.value = Math.sqrt(layar.value);
}

function pangkat() {
    layar.value = Math.pow(layar.value, 2);
}

function log() {
    layar.value = Math.log10(layar.value);
}

function toRad(x) {
    return x * Math.PI / 180;
}

function sin() {
    let x = layar.value;
    layar.value = mode === "deg" ? Math.sin(toRad(x)) : Math.sin(x);
}

function cos() {
    let x = layar.value;
    layar.value = mode === "deg" ? Math.cos(toRad(x)) : Math.cos(x);
}

function tan() {
    let x = layar.value;
    layar.value = mode === "deg" ? Math.tan(toRad(x)) : Math.tan(x);
}

function toggleMode() {
    let btn = document.querySelector(".mode");

    if (mode === "deg") {
        mode = "rad";
        btn.innerHTML = "RAD";
    } else {
        mode = "deg";
        btn.innerHTML = "DEG";
    }
}
</script>

</body>
</html>
