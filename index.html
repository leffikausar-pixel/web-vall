<!DOCTYPE html>
<html>
<head>
    <title>Web Keren</title>
    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1 id="teks">pencet dulu lah 😏</h1>
<button onclick="sapa()">Mulai</button>

<script>
function ketik(text, i = 0) {
    if (i < text.length) {
        document.getElementById("teks").innerHTML += text.charAt(i);
        setTimeout(() => ketik(text, i + 1), 50);
    }
}

function sapa() {
    let nama = prompt("nama lu sape?");
    let teks = "Halo " + nama + " 👋, selamat datang di web gua! 😎";

    document.getElementById("teks").innerHTML = "";
    ketik(teks);
}
</script>

</body>
</html>
