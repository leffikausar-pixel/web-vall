<!DOCTYPE html>
<html>
<head>
    <title>Vall Calculator 😎</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 { margin-top: 20px; }

        .calc {
            margin: 20px auto;
            width: 95%;
            max-width: 420px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        input {
            width: 100%;
            padding: 18px;
            font-size: 24px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
            text-align: right;
            box-sizing: border-box;
        }

        .history {
            max-height: 80px;
            overflow-y: auto;
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            width: 100%;
            height: 65px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            background: #00c9a7;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.92);
        }

        .op { background: #ff7675; }
        .equal { background: #ffeaa7; }
        .mode { background: #74b9ff; }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.5s linear;
            background: rgba(255,255,255,0.6);
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<h1 id="judul">pencet ga! 😡</h1>
<button onclick="sapa()">pencet!</button>

<div class="calc">
    <div class="history" id="history"></div>
    <input type="text" id="layar" readonly>

    <div class="grid">
        <button onclick="hapusSemua()">AC</button>
        <button id="delBtn">DEL</button>
        <button onclick="tambah('%')">%</button>
        <button class="op" onclick="tambah('/')">/</button>

        <button onclick="tambah('7')">7</button>
        <button onclick="tambah('8')">8</button>
        <button onclick="tambah('9')">9</button>
        <button class="op" onclick="tambah('*')">*</button>

        <button onclick="tambah('4')">4</button>
        <button onclick="tambah('5')">5</button>
        <button onclick="tambah('6')">6</button>
        <button class="op" onclick="tambah('-')">-</button>

        <button onclick="tambah('1')">1</button>
        <button onclick="tambah('2')">2</button>
        <button onclick="tambah('3')">3</button>
        <button class="op" onclick="tambah('+')">+</button>

        <button onclick="tambah('0')">0</button>
        <button class="equal" onclick="hitung()">=</button>
        <button onclick="sqrt()">√</button>
        <button onclick="pangkat()">x²</button>

        <button onclick="log()">log</button>
        <button class="mode" onclick="toggleMode()">DEG</button>
        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>

        <button onclick="tan()">tan</button>
        <button style="visibility:hidden"></button>
        <button style="visibility:hidden"></button>
        <button style="visibility:hidden"></button>
    </div>
</div>

<script>
let mode = "deg";
let delInterval;

// 🔊 SOUND (low latency)
const clickSound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");

// 📳 VIBRATION
function feedback() {
    if (navigator.vibrate) navigator.vibrate(10);
    clickSound.currentTime = 0;
    clickSound.play();
}

// 💧 RIPPLE
document.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", function(e) {
        let circle = document.createElement("span");
        circle.classList.add("ripple");

        let rect = this.getBoundingClientRect();
        let size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = (e.clientX - rect.left - size / 2) + "px";
        circle.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(circle);

        setTimeout(() => circle.remove(), 500);

        feedback();
    });
});

function sapa() {
    let nama = prompt("Nama lu siapa?");
    document.getElementById("judul").innerHTML = `Halo ${nama} 👋`;
}

function tambah(v) { layar.value += v; }
function hitung() {
    try {
        let hasil = eval(layar.value);
        tambahHistory(layar.value + " = " + hasil);
        layar.value = hasil;
    } catch { alert("Error 😭"); }
}
function hapusSemua() { layar.value = ""; }
function hapusSatu() { layar.value = layar.value.slice(0, -1); }

// HOLD DELETE
const delBtn = document.getElementById("delBtn");
delBtn.addEventListener("mousedown", () => {
    hapusSatu();
    delInterval = setInterval(hapusSatu, 100);
});
["mouseup","mouseleave","touchend"].forEach(e =>
    delBtn.addEventListener(e, () => clearInterval(delInterval))
);

// HISTORY
function tambahHistory(t) {
    history.innerHTML = t + "<br>" + history.innerHTML;
}

// SCIENTIFIC
function sqrt(){ layar.value = Math.sqrt(layar.value); }
function pangkat(){ layar.value = Math.pow(layar.value,2); }
function log(){ layar.value = Math.log10(layar.value); }

function toRad(x){ return x*Math.PI/180; }
function sin(){ layar.value = mode==="deg"?Math.sin(toRad(layar.value)):Math.sin(layar.value); }
function cos(){ layar.value = mode==="deg"?Math.cos(toRad(layar.value)):Math.cos(layar.value); }
function tan(){ layar.value = mode==="deg"?Math.tan(toRad(layar.value)):Math.tan(layar.value); }

function toggleMode(){
    let btn=document.querySelector(".mode");
    mode=mode==="deg"?"rad":"deg";
    btn.innerHTML=mode.toUpperCase();
}
</script>

</body>
</html>
