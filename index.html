<!DOCTYPE html>
<html>
<head>
    <title>Scientific Calc 😎</title>
    <style>
        body {
            background: #1e1e2f;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .calc {
            margin: 50px auto;
            width: 300px;
            padding: 20px;
            background: #2c2c3c;
            border-radius: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 18px;
            margin-bottom: 10px;
            text-align: right;
        }

        button {
            width: 60px;
            height: 40px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn { background: #00ffcc; }
        .op { background: #ff7675; }
    </style>
</head>
<body>

<h1>Scientific Calculator 🔥</h1>

<div class="calc">
    <input type="text" id="layar">

    <br>

    <button class="btn" onclick="tambah('7')">7</button>
    <button class="btn" onclick="tambah('8')">8</button>
    <button class="btn" onclick="tambah('9')">9</button>
    <button class="op" onclick="tambah('/')">/</button>

    <br>

    <button class="btn" onclick="tambah('4')">4</button>
    <button class="btn" onclick="tambah('5')">5</button>
    <button class="btn" onclick="tambah('6')">6</button>
    <button class="op" onclick="tambah('*')">*</button>

    <br>

    <button class="btn" onclick="tambah('1')">1</button>
    <button class="btn" onclick="tambah('2')">2</button>
    <button class="btn" onclick="tambah('3')">3</button>
    <button class="op" onclick="tambah('-')">-</button>

    <br>

    <button class="btn" onclick="tambah('0')">0</button>
    <button class="btn" onclick="hitung()">=</button>
    <button class="btn" onclick="hapus()">C</button>
    <button class="op" onclick="tambah('+')">+</button>

    <br>

    <button onclick="sqrt()">√</button>
    <button onclick="pangkat()">x²</button>
    <button onclick="log()">log</button>

    <br>

    <button onclick="sin()">sin</button>
    <button onclick="cos()">cos</button>
    <button onclick="tan()">tan</button>
</div>

<script>
function tambah(val) {
    document.getElementById("layar").value += val;
}

function hitung() {
    try {
        document.getElementById("layar").value =
            eval(document.getElementById("layar").value);
    } catch {
        alert("Error 😭");
    }
}

function hapus() {
    document.getElementById("layar").value = "";
}

function sqrt() {
    let x = document.getElementById("layar").value;
    document.getElementById("layar").value = Math.sqrt(x);
}

function pangkat() {
    let x = document.getElementById("layar").value;
    document.getElementById("layar").value = Math.pow(x, 2);
}

function log() {
    let x = document.getElementById("layar").value;
    document.getElementById("layar").value = Math.log10(x);
}

function sin() {
    let x = document.getElementById("layar").value;
    document.getElementById("layar").value = Math.sin(x);
}

function cos() {
    let x = document.getElementById("layar").value;
    document.getElementById("layar").value = Math.cos(x);
}

function tan() {
    let x = document.getElementById("layar").value;
    document.getElementById("layar").value = Math.tan(x);
}
</script>

</body>
</html>
